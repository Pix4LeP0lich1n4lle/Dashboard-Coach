<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard GOAT — Coach Suivies</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* CSS CUSTOM PROPERTIES & THEMES                             */
        /* ═══════════════════════════════════════════════════════════ */

        :root {
            /* Display & UI Fonts */
            --font-display: 'DM Serif Display', serif;
            --font-ui: 'Space Grotesk', sans-serif;

            /* Color Palette */
            --color-marie: #8B4513;
            --color-alex: #ff6b35;
            --color-joseph: #004B87;
            --color-chantal: #2D5F4F;
            --color-danielle: #663399;

            /* Dark Theme (default) */
            --bg-base: #0d0f14;
            --bg-surface: #13161e;
            --bg-elevated: #1a1d26;
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.45);

            /* Spacing */
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-base: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;

            /* Components */
            --card-radius: 16px;
            --button-radius: 12px;
            --transition-speed: 300ms;
            --transition-easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Light Theme */
        [data-theme="light"] {
            --bg-base: #f8f7f6;
            --bg-surface: #ffffff;
            --bg-elevated: #f3f2f1;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-tertiary: #999;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.15);
        }

        /* Ultra Dark Theme */
        [data-theme="ultra-dark"] {
            --bg-base: #0a0a0a;
            --bg-surface: #111111;
            --bg-elevated: #1a1a1a;
            --text-primary: #e8e8e8;
            --text-secondary: #999;
            --text-tertiary: #666;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* BASE STYLES                                                */
        /* ═══════════════════════════════════════════════════════════ */

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-ui);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            padding: var(--spacing-lg);
            transition: background var(--transition-speed) var(--transition-easing),
                        color var(--transition-speed) var(--transition-easing);
        }

        body[data-density="compact"] {
            padding: var(--spacing-base);
        }

        body[data-density="spacious"] {
            padding: var(--spacing-xl);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* MAIN CONTAINER                                             */
        /* ═══════════════════════════════════════════════════════════ */

        main {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* TOPBAR                                                     */
        /* ═══════════════════════════════════════════════════════════ */

        #topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--bg-surface);
            border-radius: var(--card-radius);
            margin-bottom: var(--spacing-lg);
            border-bottom: 4px solid transparent;
            background-clip: padding-box;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* 5-color gradient bottom border */
        #topbar::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(
                to right,
                var(--color-marie),
                var(--color-alex),
                var(--color-joseph),
                var(--color-chantal),
                var(--color-danielle)
            );
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .topbar-logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--color-marie) 0%, var(--color-danielle) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .playground-btn {
            padding: var(--spacing-sm) var(--spacing-base);
            background: linear-gradient(135deg, var(--color-marie), var(--color-danielle));
            color: white;
            border: none;
            border-radius: var(--button-radius);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition-speed) var(--transition-easing),
                        box-shadow var(--transition-speed) var(--transition-easing);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
        }

        .playground-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.4);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* ALERT BANNER                                               */
        /* ═══════════════════════════════════════════════════════════ */

        #alert-banner {
            display: none;
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(234, 179, 8, 0.1));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--card-radius);
            color: #ef4444;
        }

        #alert-banner.active {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        #alert-banner h3 {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-sm);
        }

        #alert-banner p {
            font-size: 14px;
            line-height: 1.6;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* HERO KPIs                                                  */
        /* ═══════════════════════════════════════════════════════════ */

        #hero-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .kpi-card {
            background: var(--bg-surface);
            padding: var(--spacing-lg);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-speed) var(--transition-easing),
                        box-shadow var(--transition-speed) var(--transition-easing);
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .kpi-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .kpi-value {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .kpi-subtext {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* PARTICIPANT GRID                                           */
        /* ═══════════════════════════════════════════════════════════ */

        #participant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        body[data-density="compact"] #participant-grid {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-sm);
        }

        body[data-card-style="minimal"] #participant-grid {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .participant-card {
            background: var(--bg-surface);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-speed) var(--transition-easing);
            --person-color: #8B4513;
            --person-glow: rgba(139, 69, 19, 0.25);
        }

        .participant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px var(--person-glow);
            border-color: var(--person-color);
        }

        body[data-card-style="minimal"] .participant-card {
            border: none;
            background: transparent;
        }

        body[data-card-style="minimal"] .participant-card:hover {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
        }

        .card-header {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .person-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex: 1;
        }

        .person-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--person-color);
            opacity: 0.2;
            flex-shrink: 0;
        }

        .person-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .person-archetype {
            font-size: 11px;
            color: var(--text-tertiary);
            font-style: italic;
        }

        .archetype-badge {
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--person-color);
            color: white;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: var(--spacing-md);
        }

        /* Progress Ring */
        .progress-section {
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }

        .progress-ring-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        svg.progress-ring {
            width: 80px;
            height: 80px;
            transform: rotate(-90deg);
            flex-shrink: 0;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 6;
        }

        .progress-ring-bg {
            stroke: var(--border-color);
        }

        .progress-ring-fg {
            stroke: var(--person-color);
            stroke-dasharray: 251;
            stroke-dashoffset: 251;
            animation: fillProgress 1s ease-out forwards;
            stroke-linecap: round;
        }

        @keyframes fillProgress {
            from { stroke-dashoffset: 251; }
            to { stroke-dashoffset: var(--offset); }
        }

        .progress-text {
            flex: 1;
        }

        .progress-percentage {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            color: var(--person-color);
            line-height: 1;
        }

        .progress-label-small {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: var(--spacing-xs);
        }

        /* Score Bars */
        .score-bar {
            margin-bottom: var(--spacing-sm);
        }

        .score-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            margin-bottom: var(--spacing-xs);
            display: flex;
            justify-content: space-between;
        }

        .score-bar-bg {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fg {
            height: 100%;
            background: var(--person-color);
            width: var(--score-width);
            transition: width var(--transition-speed) var(--transition-easing);
        }

        /* Entry Quote */
        .entry-quote {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--person-color);
            padding: var(--spacing-sm);
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 14px;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: var(--spacing-md);
        }

        .entry-quote::before {
            content: '"';
            font-size: 28px;
            color: var(--person-color);
            opacity: 0.5;
            display: block;
            line-height: 0.5;
            margin-bottom: var(--spacing-xs);
        }

        /* Win & Blocker */
        .win-blocker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .win-item, .blocker-item {
            padding: var(--spacing-sm);
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
        }

        .win-item {
            background: rgba(16, 185, 129, 0.1);
            border-left: 2px solid #10b981;
            color: #a7f3d0;
        }

        .blocker-item {
            background: rgba(239, 68, 68, 0.1);
            border-left: 2px solid #ef4444;
            color: #fca5a5;
        }

        .win-item strong, .blocker-item strong {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-xs);
            opacity: 0.8;
        }

        /* Engagement Badge */
        .engagement-badge {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--person-color);
            color: white;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* INSIGHTS & HISTORY                                         */
        /* ═══════════════════════════════════════════════════════════ */

        #insights-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .insight-card {
            background: var(--bg-surface);
            padding: var(--spacing-md);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .insight-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        .insight-card p {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        #activity-history {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-xl);
        }

        #activity-history h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-tertiary);
            flex-shrink: 0;
        }

        .activity-time {
            color: var(--text-tertiary);
            min-width: 80px;
            font-size: 12px;
        }

        .activity-text {
            color: var(--text-secondary);
            flex: 1;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* FOOTER & PROMPT OUTPUT                                     */
        /* ═══════════════════════════════════════════════════════════ */

        #prompt-output {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-xl);
        }

        #prompt-output h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        #coach-summary {
            width: 100%;
            height: 200px;
            padding: var(--spacing-base);
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            resize: vertical;
            margin-bottom: var(--spacing-sm);
        }

        #copy-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-marie);
            color: white;
            border: none;
            border-radius: var(--button-radius);
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed) var(--transition-easing);
        }

        #copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        #copy-btn.copied {
            background: #10b981;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* PLAYGROUND SIDEBAR                                         */
        /* ═══════════════════════════════════════════════════════════ */

        #playground-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--bg-surface);
            border-left: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            overflow-y: auto;
            z-index: 1000;
            transition: right 0.4s ease-out;
            padding: var(--spacing-lg);
        }

        #playground-sidebar.open {
            right: 0;
        }

        .playground-close {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background var(--transition-speed);
        }

        .playground-close:hover {
            background: var(--bg-base);
        }

        .playground-section {
            margin-bottom: var(--spacing-lg);
        }

        .playground-section h4 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .playground-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .playground-btn-small {
            padding: var(--spacing-sm);
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .playground-btn-small.active {
            background: var(--color-marie);
            color: white;
            border-color: var(--color-marie);
        }

        .playground-btn-small:hover:not(.active) {
            background: var(--bg-elevated);
            border-color: var(--text-secondary);
        }

        .playground-checkbox {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm);
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .playground-checkbox:hover {
            background: var(--bg-elevated);
        }

        .playground-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .playground-checkbox label {
            flex: 1;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
        }

        /* Playground Toggle Button */
        #playground-toggle {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-marie), var(--color-danielle));
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-speed) var(--transition-easing);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #playground-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* RESPONSIVE DESIGN                                          */
        /* ═══════════════════════════════════════════════════════════ */

        @media (max-width: 1100px) {
            #participant-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }

            #hero-kpis {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            #topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-sm);
                padding: var(--spacing-md);
            }

            .topbar-logo {
                font-size: 20px;
            }

            .topbar-right {
                width: 100%;
                justify-content: flex-start;
            }

            #participant-grid {
                grid-template-columns: 1fr;
            }

            #hero-kpis {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-sm);
            }

            .kpi-value {
                font-size: 36px;
            }

            #playground-sidebar {
                width: 100%;
                right: -100%;
                max-width: 100vw;
            }

            .progress-ring-container {
                flex-direction: column;
                text-align: center;
            }

            .win-blocker {
                grid-template-columns: 1fr;
            }

            #insights-panel {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: var(--spacing-base);
            }

            #topbar {
                border-radius: 8px;
                padding: var(--spacing-sm);
            }

            .topbar-logo {
                font-size: 16px;
            }

            .topbar-title {
                font-size: 14px;
            }

            #participant-grid {
                gap: var(--spacing-sm);
            }

            .kpi-value {
                font-size: 28px;
            }

            svg.progress-ring {
                width: 64px;
                height: 64px;
            }

            .progress-percentage {
                font-size: 24px;
            }

            #playground-toggle {
                width: 48px;
                height: 48px;
                font-size: 20px;
                bottom: var(--spacing-md);
                right: var(--spacing-md);
            }
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* UTILITY CLASSES                                            */
        /* ═══════════════════════════════════════════════════════════ */

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }
    </style>

            const saved = localStorage.getItem('dashboard-goat-state');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.assign(STATE, parsed);
            }
        }

        function saveState() {
            localStorage.setItem('dashboard-goat-state', JSON.stringify(STATE));
        }

        function updateState(key, value) {
            STATE[key] = value;
            saveState();
            applyState();
        }

        function updateSection(section, checked) {
            STATE.sections[section] = checked;
            saveState();
            applyState();
        }

            const body = document.body;
            body.setAttribute('data-theme', STATE.theme);
            body.setAttribute('data-density', STATE.density);
            body.setAttribute('data-card-style', STATE.cardStyle);

            document.documentElement.style.setProperty('--transition-speed',

                STATE.animSpeed === 'fast' ? '150ms' : '300ms'
            );

            document.documentElement.style.setProperty('--font-scale', STATE.fontScale);

        function calculateProgressOffset(percent) {
            const circumference = 251; // 2 * π * r (r=40)
            return circumference - (circumference * percent / 100);
        }

        function createCardElement(key, member) {
            const colors = PARTICIPANT_COLORS[key];
            const offset = calculateProgressOffset(member.taux_success);

            const card = document.createElement('div');
            card.className = 'participant-card';
            card.style.setProperty('--person-color', colors.color);
            card.style.setProperty('--person-glow', colors.glow);

            // Header

            header.className = 'card-header';

            const personInfo = document.createElement('div');
            personInfo.className = 'person-info';

            const avatar = document.createElement('div');
            avatar.className = 'person-avatar';

            const info = document.createElement('div');
            const nameEl = document.createElement('div');
            nameEl.className = 'person-name';
            nameEl.textContent = member.nom;
            const archetypeEl = document.createElement('div');
            archetypeEl.className = 'person-archetype';
            archetypeEl.textContent = ARCHETYPES[key];

            info.appendChild(nameEl);
            info.appendChild(archetypeEl);
            personInfo.appendChild(avatar);
            personInfo.appendChild(info);

            badge.className = 'archetype-badge';
            badge.textContent = member.taux_success.toFixed(0) + '%';

            header.appendChild(personInfo);
            header.appendChild(badge);

            bgCircle.setAttribute('cy', '50');
            bgCircle.setAttribute('r', '40');
            bgCircle.setAttribute('class', 'progress-ring-bg');

            const fgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');

            fgCircle.setAttribute('cy', '50');
            fgCircle.setAttribute('r', '40');

                { time: '09:45', text: 'Dashboard actualisé avec nouvelles données' }
            ];

            activities.forEach(activity => {
                const item = document.createElement('div');
                item.className = 'activity-item';

                const dot = document.createElement('div');
                dot.className = 'activity-dot';

                const time = document.createElement('div');
                time.className = 'activity-time';
                time.textContent = activity.time;

                const text = document.createElement('div');
                text.className = 'activity-text';
                text.textContent = activity.text;

                item.appendChild(dot);
                item.appendChild(time);
                item.appendChild(text);
                container.appendChild(item);
            });
        }

        function renderCoachSummary() {
            const summary = MOCK_DATA.summary;
            const alerts = Object.entries(MOCK_DATA.members)
                .filter(([_, m]) => m.alerte)
                .map(([_, m]) => m.nom)
                .join(', ');

            const text = `RAPPORT COACH SUIVIES — Lundi, 2 mars 2026
═══════════════════════════════════════════════════════
ÉQUIPE: 5 participants actifs | S09
Taux moyen: ${summary.avg_taux_success.toFixed(1)}% | ⚠ ${summary.membres_en_alerte} alerte(s)

HIGHLIGHTS:
✓ Marie Giguère: 91.3% (en feu) — Méditation stable
✓ Alex Delorey: 77.5% (engagement) — Habitude en consolidation
✓ Joseph Delorey: 83.2% (engagement) — Clarté retrouvée
⚠ Chantal Felteau: 75.0% (fading) — Intervention recommandée
✓ Danielle Delorey: 82.1% (engagement) — Système stabilisé

PRIORITÉ COACHING:
→ Chantal Felteau: Réactivation (1 jour inactif détecté)
→ Maintenir momentum équipe (81.8% moyen solide)

Mis à jour: ${summary.derniere_update}`;

            document.getElementById('coach-summary').value = text;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* EVENT LISTENERS                                            */
        /* ═══════════════════════════════════════════════════════════ */

        document.getElementById('playground-open').addEventListener('click', () => {
            document.getElementById('playground-sidebar').classList.add('open');
        });

        document.getElementById('playground-toggle').addEventListener('click', () => {
            document.getElementById('playground-sidebar').classList.toggle('open');
        });

        document.getElementById('playground-close').addEventListener('click', () => {
            document.getElementById('playground-sidebar').classList.remove('open');
        });

        // Playground buttons
        document.querySelectorAll('[data-setting]').forEach(btn => {
            btn.addEventListener('click', function() {
                const setting = this.dataset.setting;
                const value = this.dataset.value;

                // Update active button styling
                document.querySelectorAll(`[data-setting="${setting}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                this.classList.add('active');

                // Update state
                updateState(setting, value);
            });
        });

        // Section checkboxes
        document.querySelectorAll('[data-section]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                updateSection(this.dataset.section, this.checked);
            });
        });

        // Copy button
        document.getElementById('copy-btn').addEventListener('click', function() {
            const textarea = document.getElementById('coach-summary');
            textarea.select();
            document.execCommand('copy');

            this.textContent = '✓ Copié!';
            this.classList.add('copied');
            setTimeout(() => {
                this.textContent = '📋 Copier Résumé';
                this.classList.remove('copied');
            }, 2000);
        });

        // Close sidebar on mobile when clicking outside
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('playground-sidebar');
            const toggle = document.getElementById('playground-toggle');
            const openBtn = document.getElementById('playground-open');

            if (!sidebar.contains(e.target) && !toggle.contains(e.target) && !openBtn.contains(e.target)) {
                if (window.innerWidth < 768) {
                    sidebar.classList.remove('open');
                }
            }
        });

        /* ═══════════════════════════════════════════════════════════ */
        /* INITIALIZATION                                             */
        /* ═══════════════════════════════════════════════════════════ */

        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            renderHeroKPIs();
            renderAllCards();
            renderAlerts();
            renderInsights();
            renderActivity();
            renderCoachSummary();
            applyState();

            // Update time in topbar
            const updateTime = () => {
                const now = new Date().toLocaleTimeString('fr-FR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                // Optionally add time display
            };
            updateTime();
            setInterval(updateTime, 60000);
        });
    </script>

</body>
