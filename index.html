<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard — Toutes les Semaines</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #13192a;
            --bg-tertiary: #1a2238;
            --text-primary: #e8eef5;
            --text-secondary: #a8b2c1;
            --text-muted: #6b7687;
            --accent-fire: #ff5e4d;
            --accent-green: #2ecc71;
            --accent-yellow: #f39c12;
            --accent-gray: #495566;
            --border: #252d3d;
            --hover: rgba(255, 255, 255, 0.08);
        }

        html.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fc;
            --bg-tertiary: #eff2f8;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border: #e2e8f0;
            --hover: rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .header-left p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .week-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .selector-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
            display: block;
        }

        .selector-dropdown {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
        }

        .week-info {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .week-info {
                grid-template-columns: 1fr;
            }
        }

        .info-item {
            text-align: center;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
            font-family: 'IBM Plex Mono', monospace;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1000px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-fire);
            margin-bottom: 0.5rem;
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1200px) {
            .participants-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .participants-grid {
                grid-template-columns: 1fr;
            }
        }

        .participant-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease-out;
        }

        .participant-card:nth-child(1) { animation-delay: 0.05s; }
        .participant-card:nth-child(2) { animation-delay: 0.1s; }
        .participant-card:nth-child(3) { animation-delay: 0.15s; }
        .participant-card:nth-child(4) { animation-delay: 0.2s; }
        .participant-card:nth-child(5) { animation-delay: 0.25s; }

        .participant-card:hover {
            border-color: var(--accent-fire);
            background: var(--hover);
            transform: translateY(-2px);
        }

        .participant-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .engagement-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .engagement-fading {
            background: var(--accent-yellow);
            color: #000;
        }

        .engagement-ghost {
            background: var(--accent-gray);
            color: white;
        }

        .participant-stat {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        .participant-stat:last-child {
            border-bottom: none;
        }

        .stat-val {
            font-weight: 700;
            color: var(--accent-fire);
            font-family: 'IBM Plex Mono', monospace;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .entries-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .entry {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease-out;
        }

        .entry:hover {
            background: var(--hover);
        }

        .entry:last-child {
            border-bottom: none;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry-person {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .entry-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-fire);
            font-weight: 700;
        }

        .entry-day {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: capitalize;
            margin-top: 0.3rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📊 Coach Dashboard</h1>
            <p>Suivi des Entrées — S01 à S09</p>
        </div>
        <div class="header-right">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
        </div>
    </div>

    <div class="container">
        <!-- Week Selector -->
        <div class="week-selector">
            <label class="selector-label" for="weekSelect">Sélectionner une semaine</label>
            <select class="selector-dropdown" id="weekSelect" onchange="updateWeek()">
                <option value="S09">S09 — 2-8 Mars (EN COURS)</option>
                <option value="S08">S08 — 23 Fév - 1 Mars</option>
                <option value="S07">S07 — 16-22 Février</option>
                <option value="S06">S06 — 9-15 Février</option>
                <option value="S05">S05 — 2-8 Février</option>
                <option value="S04">S04 — 26 Jan - 1 Fév</option>
                <option value="S03">S03 — 19-25 Janvier</option>
                <option value="S02">S02 — 12-18 Janvier</option>
                <option value="S01">S01 — 5-11 Janvier</option>
            </select>
        </div>

        <!-- Week Info -->
        <div class="week-info">
            <div class="info-item">
                <div class="info-value" id="entryCount">0</div>
                <div class="info-label">Entrées</div>
            </div>
            <div class="info-item">
                <div class="info-value" id="activeCount">0</div>
                <div class="info-label">Participants</div>
            </div>
            <div class="info-item">
                <div class="info-value" id="avgRate">0%</div>
                <div class="info-label">Taux Moyen</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Participants -->
        <h2 class="section-title">👥 Participants</h2>
        <div class="participants-grid" id="participantsGrid"></div>

        <!-- Entries -->
        <h2 class="section-title">📝 Entrées</h2>
        <div class="entries-container" id="entriesContainer"></div>
    </div>

    <div class="footer">
        <p>Coach Dashboard • S01-S09 • Suivi des entrées</p>
    </div>

    <script>
        const weekData = {
            "S09": {
                "dates": "2-8 Mars",
                "entries": [
                    {"person": "Alex Delorey", "time": "07:07:40", "day": "lundi"},
                    {"person": "Joseph Delorey", "time": "13:38:33", "day": "lundi"},
                    {"person": "Danielle Delorey", "time": "16:22:38", "day": "lundi"}
                ],
                "participants": {
                    "Marie": {entries: 0, rate: 0, state: "ghost"},
                    "Alex": {entries: 1, rate: 20, state: "fading"},
                    "Joseph": {entries: 1, rate: 20, state: "fading"},
                    "Chantal": {entries: 0, rate: 0, state: "ghost"},
                    "Danielle": {entries: 1, rate: 20, state: "fading"}
                }
            },
            "S08": {
                "dates": "23 Fév - 1 Mars",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 20, state: "fading"},
                    "Alex": {entries: 0, rate: 40, state: "fading"},
                    "Joseph": {entries: 0, rate: 30, state: "fading"},
                    "Chantal": {entries: 0, rate: 10, state: "ghost"},
                    "Danielle": {entries: 0, rate: 60, state: "engagement"}
                }
            },
            "S07": {
                "dates": "16-22 Février",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 40, state: "fading"},
                    "Alex": {entries: 0, rate: 20, state: "fading"},
                    "Joseph": {entries: 0, rate: 15, state: "ghost"},
                    "Chantal": {entries: 0, rate: 10, state: "ghost"},
                    "Danielle": {entries: 0, rate: 70, state: "engagement"}
                }
            },
            "S06": {
                "dates": "9-15 Février",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 40, state: "fading"},
                    "Alex": {entries: 0, rate: 50, state: "fading"},
                    "Joseph": {entries: 0, rate: 0, state: "ghost"},
                    "Chantal": {entries: 0, rate: 0, state: "ghost"},
                    "Danielle": {entries: 0, rate: 50, state: "fading"}
                }
            },
            "S05": {
                "dates": "2-8 Février",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 0, state: "ghost"},
                    "Alex": {entries: 0, rate: 20, state: "fading"},
                    "Joseph": {entries: 0, rate: 0, state: "ghost"},
                    "Chantal": {entries: 0, rate: 10, state: "ghost"},
                    "Danielle": {entries: 0, rate: 40, state: "fading"}
                }
            },
            "S04": {
                "dates": "26 Jan - 1 Fév",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 10, state: "ghost"},
                    "Alex": {entries: 0, rate: 30, state: "fading"},
                    "Joseph": {entries: 0, rate: 0, state: "ghost"},
                    "Chantal": {entries: 0, rate: 20, state: "ghost"},
                    "Danielle": {entries: 0, rate: 30, state: "fading"}
                }
            },
            "S03": {
                "dates": "19-25 Janvier",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 20, state: "fading"},
                    "Alex": {entries: 0, rate: 40, state: "fading"},
                    "Joseph": {entries: 0, rate: 10, state: "ghost"},
                    "Chantal": {entries: 0, rate: 15, state: "ghost"},
                    "Danielle": {entries: 0, rate: 40, state: "fading"}
                }
            },
            "S02": {
                "dates": "12-18 Janvier",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 0, state: "ghost"},
                    "Alex": {entries: 0, rate: 10, state: "ghost"},
                    "Joseph": {entries: 0, rate: 0, state: "ghost"},
                    "Chantal": {entries: 0, rate: 10, state: "ghost"},
                    "Danielle": {entries: 0, rate: 60, state: "engagement"}
                }
            },
            "S01": {
                "dates": "5-11 Janvier",
                "entries": [],
                "participants": {
                    "Marie": {entries: 0, rate: 40, state: "fading"},
                    "Alex": {entries: 0, rate: 20, state: "fading"},
                    "Joseph": {entries: 0, rate: 0, state: "ghost"},
                    "Chantal": {entries: 0, rate: 10, state: "ghost"},
                    "Danielle": {entries: 0, rate: 100, state: "feu"}
                }
            }
        };

        const participantNames = ["Marie Giguère", "Alex Delorey", "Joseph Delorey", "Chantal Felteau", "Danielle Delorey"];

        function updateWeek() {
            const week = document.getElementById('weekSelect').value;
            const data = weekData[week];

            // Update week info
            document.getElementById('entryCount').textContent = data.entries.length;
            const activeCount = Object.values(data.participants).filter(p => p.entries > 0).length;
            document.getElementById('activeCount').textContent = activeCount;
            const avgRate = Math.round(Object.values(data.participants).reduce((sum, p) => sum + p.rate, 0) / 5);
            document.getElementById('avgRate').textContent = avgRate + '%';

            // Update stats
            let statsHtml = '';
            statsHtml += '<div class="stat-card"><div class="stat-value">' + data.entries.length + '</div><div class="stat-label">Entrées</div></div>';
            statsHtml += '<div class="stat-card"><div class="stat-value">' + activeCount + '</div><div class="stat-label">Actifs</div></div>';
            statsHtml += '<div class="stat-card"><div class="stat-value">' + avgRate + '%</div><div class="stat-label">Taux</div></div>';
            statsHtml += '<div class="stat-card"><div class="stat-value">' + week + '</div><div class="stat-label">Semaine</div></div>';
            document.getElementById('statsGrid').innerHTML = statsHtml;

            // Update participants
            let participantsHtml = '';
            for (const name of participantNames) {
                const key = name.split(' ')[0];
                const pData = data.participants[key];
                const badgeClass = pData.state === 'feu' ? 'engagement-fading' : (pData.state === 'engagement' ? 'engagement-fading' : 'engagement-ghost');
                
                participantsHtml += '<div class="participant-card">';
                participantsHtml += '<div class="participant-name">' + name + '</div>';
                participantsHtml += '<div class="engagement-badge ' + badgeClass + '">' + pData.state + '</div>';
                participantsHtml += '<div class="participant-stat"><span>Entrées</span><span class="stat-val">' + pData.entries + '</span></div>';
                participantsHtml += '<div class="participant-stat"><span>Taux</span><span class="stat-val">' + pData.rate + '%</span></div>';
                participantsHtml += '</div>';
            }
            document.getElementById('participantsGrid').innerHTML = participantsHtml;

            // Update entries
            if (data.entries.length === 0) {
                document.getElementById('entriesContainer').innerHTML = '<div class="empty-state">Aucune entrée cette semaine</div>';
            } else {
                let entriesHtml = '';
                for (const entry of data.entries) {
                    entriesHtml += '<div class="entry">';
                    entriesHtml += '<div class="entry-header">';
                    entriesHtml += '<div><div class="entry-person">✓ ' + entry.person + '</div><div class="entry-day">' + entry.day + '</div></div>';
                    entriesHtml += '<div class="entry-time">' + entry.time + '</div>';
                    entriesHtml += '</div></div>';
                }
                document.getElementById('entriesContainer').innerHTML = entriesHtml;
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-mode');
            localStorage.setItem('theme', html.classList.contains('light-mode') ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = html.classList.contains('light-mode') ? '☀️ Light' : '🌙 Dark';
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
            document.querySelector('.theme-toggle').textContent = '☀️ Light';
        }

        // Initialize
        updateWeek();
    </script>
</body>
</html>
